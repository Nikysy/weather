name: Docker Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Debug
        run: |
          test -n "${{ secrets.DOCKER_USERNAME }}" && echo "USER OK" || echo "USER MISSING"
          test -n "${{ secrets.DOCKER_PASSWORD }}" && echo "PASS OK" || echo "PASS MISSING"

      - name: Checkout
        uses: actions/checkout@v5


      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/weather:latest
            ${{ secrets.DOCKER_USERNAME }}/weather:${{ github.event.release.tag_name }}